<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATCHING — 企業理念×アーティスト — BANK OF ART</title>
<meta name="description" content="5つの質問でわかる、あなたの企業に響くアーティスト診断。バンク・オブ・アート公式マッチング機能。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500;700&family=Cinzel:wght@500;700&family=Shippori+Mincho+B1:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #01ae84;
  --brand-deep: #018c6a;
  --brand-soft: rgba(1,174,132,.08);
  --ink: #212121;
  --paper: #f5f0ea;
  --dark: #212121;
  --mid: #6e6862;
  --border: rgba(33,33,33,.18);
  --border-soft: rgba(33,33,33,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Shippori Mincho B1', serif; color: var(--ink); background: var(--paper); line-height: 1.7; }
img { max-width: 100%; height: auto; display: block; }

/* ── ヘッダー（簡略版） ── */
.h-bar { position: sticky; top: 0; z-index: 100; background: rgba(245,240,234,.94); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-soft); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
.h-back { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; color: var(--ink); text-decoration: none; }
.h-back:hover { color: var(--brand); }
.h-logo { font-family: 'Cormorant SC', serif; font-size: 18px; letter-spacing: 4px; color: var(--ink); text-decoration: none; }

/* ── ヒーロー ── */
.match-hero { padding: 100px 40px 80px; text-align: center; }
.match-hero-eyebrow { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px; color: var(--brand); text-transform: uppercase; margin-bottom: 18px; }
.match-hero-title { font-family: 'Cormorant SC', serif; font-size: 72px; font-weight: 400; letter-spacing: 3px; line-height: 1; color: var(--ink); margin-bottom: 14px; }
.match-hero-ja { font-family: 'Shippori Mincho B1', serif; font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--ink); margin-bottom: 36px; }
.match-hero-lead { max-width: 640px; margin: 0 auto 48px; font-size: 15px; line-height: 2; color: var(--mid); letter-spacing: 1px; }
.match-start-btn { display: inline-block; font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: var(--brand); border: 1px solid var(--brand); padding: 20px 56px; cursor: pointer; transition: background .3s, border-color .3s; }
.match-start-btn:hover { background: var(--brand-deep); border-color: var(--brand-deep); }

/* ── 質問エリア ── */
.match-q-section { padding: 80px 24px 120px; max-width: 800px; margin: 0 auto; }
.match-progress { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; color: var(--brand); text-align: center; margin-bottom: 14px; }
.match-progress-bar { width: 100%; max-width: 600px; margin: 0 auto 48px; height: 3px; background: var(--border-soft); position: relative; }
.match-progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--brand); transition: width .4s ease; }
.match-q-title { font-family: 'Shippori Mincho B1', serif; font-size: 24px; font-weight: 700; letter-spacing: 2px; color: var(--ink); text-align: center; margin-bottom: 48px; line-height: 1.6; }
.match-options { display: flex; flex-direction: column; gap: 14px; }
.match-option { background: #fff; border: 1px solid var(--border); padding: 22px 28px; text-align: left; cursor: pointer; transition: border-color .25s, background .25s, transform .15s; font-family: 'Shippori Mincho B1', serif; font-size: 15px; line-height: 1.7; color: var(--ink); letter-spacing: 1px; }
.match-option:hover { border-color: var(--brand); background: var(--brand-soft); }
.match-option:active { transform: scale(0.99); }

/* ── ローディング ── */
.match-loading { padding: 160px 40px; text-align: center; }
.match-loading-spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--brand); border-radius: 50%; margin: 0 auto 24px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.match-loading-text { font-family: 'Shippori Mincho B1', serif; font-size: 15px; letter-spacing: 2px; color: var(--mid); }

/* ── 結果画面 ── */
.match-result { padding: 80px 24px 120px; max-width: 1000px; margin: 0 auto; }
.result-eyebrow { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px; color: var(--brand); text-transform: uppercase; text-align: center; margin-bottom: 14px; }
.result-title { font-family: 'Shippori Mincho B1', serif; font-size: 28px; font-weight: 700; letter-spacing: 2px; color: var(--ink); text-align: center; margin-bottom: 60px; line-height: 1.6; }

.result-main { background: #fff; padding: 0; border: 1px solid var(--border-soft); margin-bottom: 60px; overflow: hidden; }
.result-main-photo { width: 100%; aspect-ratio: 3 / 2; background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; }
.result-main-photo-initial { font-family: 'Cormorant SC', serif; font-size: 120px; font-weight: 400; letter-spacing: 8px; color: rgba(255,255,255,.95); }
.result-main-body { padding: 48px 48px 60px; }
.result-main-name-en { font-family: 'Cormorant SC', serif; font-size: 48px; font-weight: 400; letter-spacing: 2px; text-align: center; color: var(--ink); margin-bottom: 8px; }
.result-main-name-ja { font-family: 'Shippori Mincho B1', serif; font-size: 18px; font-weight: 700; letter-spacing: 3px; text-align: center; color: var(--brand); margin-bottom: 36px; }
.result-main-theme { font-family: 'Shippori Mincho B1', serif; font-size: 14px; font-style: normal; color: var(--mid); text-align: center; margin-bottom: 32px; letter-spacing: 1px; }
.result-main-message { font-family: 'Shippori Mincho B1', serif; font-size: 15px; line-height: 2.1; color: var(--ink); letter-spacing: 1px; max-width: 720px; margin: 0 auto 36px; }
.result-main-cta { text-align: center; }
.result-main-cta a { display: inline-block; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--ink); background: transparent; border: 1px solid var(--ink); padding: 14px 36px; text-decoration: none; transition: background .3s, color .3s; }
.result-main-cta a:hover { background: var(--ink); color: #fff; }

.result-sub-h { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 4px; color: var(--brand); text-transform: uppercase; text-align: center; margin-bottom: 24px; }
.result-sub-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 60px; }
.result-sub-card { background: #fff; padding: 0; border: 1px solid var(--border-soft); text-align: center; transition: border-color .25s, transform .25s; overflow: hidden; display: block; text-decoration: none; }
.result-sub-card:hover { border-color: var(--brand); transform: translateY(-4px); }
.result-sub-photo { width: 100%; aspect-ratio: 1 / 1; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
.result-sub-photo-initial { font-family: 'Cormorant SC', serif; font-size: 56px; font-weight: 400; letter-spacing: 4px; color: rgba(255,255,255,.95); }
.result-sub-body { padding: 22px 18px 24px; }
.result-sub-name-en { font-family: 'Cormorant SC', serif; font-size: 22px; font-weight: 400; letter-spacing: 1px; color: var(--ink); margin-bottom: 4px; }
.result-sub-name-ja { font-family: 'Shippori Mincho B1', serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--brand); margin-bottom: 12px; }
.result-sub-theme { font-family: 'Shippori Mincho B1', serif; font-size: 11px; line-height: 1.6; color: var(--mid); margin-bottom: 14px; min-height: 36px; }
.result-sub-card a { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--brand); text-decoration: none; }

.result-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.result-actions a, .result-actions button { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; padding: 16px 32px; text-decoration: none; cursor: pointer; transition: all .3s; background: transparent; }
.result-actions .is-secondary { color: var(--ink); border: 1px solid var(--ink); }
.result-actions .is-secondary:hover { background: var(--ink); color: #fff; }
.result-actions .is-primary { color: #fff; background: var(--brand); border: 1px solid var(--brand); }
.result-actions .is-primary:hover { background: var(--brand-deep); }

/* 切替 */
.match-screen { display: none; }
.match-screen.is-active { display: block; }

@media (max-width: 700px) {
  .match-hero { padding: 60px 20px 40px; }
  .match-hero-title { font-size: 44px; }
  .match-hero-ja { font-size: 13px; }
  .match-hero-lead { font-size: 13px; margin-bottom: 36px; }
  .match-start-btn { padding: 18px 36px; font-size: 13px; }
  .match-q-section { padding: 40px 16px 80px; }
  .match-q-title { font-size: 18px; margin-bottom: 32px; }
  .match-option { padding: 18px 20px; font-size: 14px; }
  .result-title { font-size: 20px; }
  .result-main-body { padding: 32px 24px 40px; }
  .result-main-photo-initial { font-size: 72px; }
  .result-main-name-en { font-size: 36px; }
  .result-sub-body { padding: 18px 14px 20px; }
  .result-sub-photo-initial { font-size: 44px; }
  .result-main-name-ja { font-size: 15px; }
  .result-main-message { font-size: 13px; line-height: 1.95; }
  .result-sub-list { grid-template-columns: 1fr; gap: 14px; }
  .result-sub-card { padding: 24px 18px; }
  .result-sub-theme { min-height: auto; }
}
</style>
</head>

  </div>
</section>

<script>

'use strict';

// ════════ 質問データ ════════
var QUESTIONS = [
  { id: 'q1', text: '御社が事業を通じて、最も大切にしているのは？', weight: 30, options: [
    { label: '人と人とのつながりを生むこと', tags: ['つながり','コミュニティ','地域'] },

    { label: 'じっくり、丁寧に積み上げる', tags: ['静謐','工芸','継承'] },
    { label: '自由でDIYな精神', tags: ['DIY','ストリート','バンドカルチャー'] },

// ════════ アーティストマスター ════════
var ARTISTS = [
  { id:'azuma',   nameEn:'AZUMA JUSEI', nameJa:'東樹生', theme:'ADRENALINE ART — 身体で叩き込む絵画', tags:['挑戦','突破','唯一無二','力強さ','格闘','生命エネルギー'], message:'神戸芸術工科大学で学んだ東は、絵筆を捨て、身体に絵具を塗布して拳・頭突き・蹴りをキャンバスに叩き込む「ADRENALINE ART」を生み出しました。「表現は命をかけた戦い」と定義する彼の作品は、新しい価値を生み出そうとする御社の姿勢と深く響き合います。', photo:'', grad:'linear-gradient(135deg,#2a2a2a 0%,#01ae84 100%)', initial:'AZ', works:['linear-gradient(135deg,#3a3a3a 0%,#dc4444 100%)','linear-gradient(135deg,#1a3a3a 0%,#01ae84 100%)','linear-gradient(135deg,#4a2a2a 0%,#222222 100%)'] },
  { id:'bond',    nameEn:'TOMINAGA BOND', nameJa:'冨永ボンド', theme:'ツナガリ（BOND）— ボンドで描く独自画法', tags:['つながり','コミュニティ','地域','DIY','偶然','唯一無二'], message:'2009年、福岡の音楽イベントで偶然ボンドで絵を描いた瞬間から、彼は「人と人・人とアートをつなぐ」ライブアートに人生を捧げてきました。佐賀県多久市の過疎地に500坪の活動拠点を構え、20,000人以上にボンドアートを体験させた彼の歩みは、コミュニティを大切にする御社のパーパスと響き合います。' },
  { id:'chob',    nameEn:'CHOB-ONE', nameJa:'CHOB-ONE', theme:'グラフィティ × 社会批評', tags:['ストリート','社会批評','DIY','不条理','力強さ'], message:'18歳でストリートアートに快楽を覚え、20歳で「誰にも縛られない自己満足な集団」S.S.CREWを結成。B\'zから東方神起、AAAまで著名アーティストのARTWORKを手がけながら、「真実を語る少女」シリーズで現代社会への鋭い問いかけを続けています。' },
  { id:'dots',    nameEn:'DOTSCOLLECTIVE', nameJa:'dotscollective', theme:'ROCK × ART — 札幌バンドユニット', tags:['DIY','バンドカルチャー','つながり','ストリート','POP'], message:'札幌のロックバンドNOISEMAKERのメンバーAGとHIDEが、長年のバンドマーチデザインのキャリアから生み出した別プロジェクト。「すべての点が結ばれることを願う」というコンセプトは、コミュニティと創造の自由を重んじる御社のカルチャーと共鳴します。' },
  { id:'erika',   nameEn:'ERIKA', nameJa:'erika', theme:'世界のランドマーク — Z series', tags:['多様性','越境','若手'], message:'慶應義塾大学在学中の若手作家erikaが描く「Z」シリーズ。グランドキャニオン、厳島神社、サントリーニ、タージマハル — 世界各地のランドマークを切り取る彼女の作品は、グローバルな視野を持つ御社の空間に、開かれた感性をもたらします。' },
  { id:'fuji',    nameEn:'FUJI RISAKO', nameJa:'藤理沙子', theme:'心を豊かにするパワー', tags:['再生','第二のキャリア','癒し','心の豊かさ','救い'], message:'工学院大学卒業後にメーカーへ就職するも、アイデンティティが失われていく感覚に苦しみ精神を崩した彼女は、「アートは心を豊かにするパワーがある」と信じ、4年勤めた会社を辞めてアーティストの道へ。「人の世界が輝いて見えるような作品」を届けたいという思いは、御社のパーパスと深く響き合います。' },
  { id:'gen',     nameEn:'GEN', nameJa:'玄', theme:'社会と希望のアート', tags:['社会貢献','貧困','SDGs','希望','子供'], message:'20歳でヨーロッパの巨匠の絵に感動する鑑賞者を見て「自己満足な創作」を恥じ、「これからは誰かのために描きたい」と決意。ネパール・セブ島でアート街プロジェクトを主催し、長坂真護氏に住み込み修行した彼の作品は、社会課題に向き合う御社の姿勢と響き合います。' },
  { id:'green',   nameEn:'GREEN IS BEAUTIFUL', nameJa:'GREEN IS BEAUTIFUL', theme:'POPで社会を語る', tags:['POP','ポジティブ','社会批評','家族','多様性'], message:'グラフィックデザイナーの父・油彩画家の母のもとに生まれ、社会的メッセージを「悲観的にではなくPOPアートでアウトプットする」というスタンスを貫く彼の作品は、明るく前向きに価値を発信したい御社のカルチャーと響き合います。' },

  { id:'saki',    nameEn:'SAKI', nameJa:'saki', theme:'絵は救い、ただひとつ光のような存在', tags:['自然','植物','救い','静謐','再生','心の豊かさ'], message:'横浜で生まれた彼女は、思春期に「どん底をさまよう精神状態」を経験し、美術大学で油絵に出会い「絵は救いであり、ただひとつ光のような存在」と語ります。武蔵野美術大学卒業制作で総代を獲得し、屋久島取材から3.6m×7mの大作を生んだ彼女の植物画は、御社の空間に静かな救いをもたらします。' },
  { id:'shimoie', nameEn:'SHIMOIE ANJU', nameJa:'下家杏樹', theme:'日本画 — 線に刻む祖父の記憶', tags:['家族','継承','伝統','工芸','静謐'], message:'名古屋手書き友禅の伝統工芸士だった祖父と過ごした幼少期、祖父の急逝、漫画をやめて本格的に絵を学ぶ決意、そしてロンドンで鈴木春信の春画展に出会い「日本画の線の美しさに祖父の着物がよぎった」瞬間。線に祖父の記憶を継承する彼女の作品は、御社のパーパスと深く響き合います。' },
  { id:'shin',    nameEn:'SHIN LI', nameJa:'シン リー', theme:'日中の架け橋 — 伝統と若い感性', tags:['伝統','継承','国際','越境','工芸'], message:'中国大連で生まれ、絵を描く父の影響で創作の世界へ。2016年に来日し、日本の文化と歴史を学ぶ中で日本画の奥深さと繊細さに惹かれ、2022年京都芸術大学へ。中国と日本、伝統と若い感性を架け橋にする彼女の作品は、国際性と継承を重んじる御社の理念と響き合います。' },
  { id:'tanaka',  nameEn:'TANAKA TAKUMA', nameJa:'田中拓馬', theme:'再起の物語 — NYからの帰還', tags:['再生','第二のキャリア','挑戦','越境','国際','不条理'], message:'早稲田大学法学部卒業、旧司法試験挫折、精神的に病んだ末に病院の作業療法でアートに目覚める。路上販売5年で月120万円稼ぎ、岡崎乾二郎に学び、2010年に上海へ飛び込み営業、イギリス国立アルスター美術館に作品収蔵、NY最古のSalmagundi Art Clubで個展。「運命的にアートに突入した」彼の作品は、御社の挑戦の物語と響き合います。' },
  { id:'tiki',    nameEn:'TIKI', nameJa:'tiki', theme:'空の宝箱を持った子供たち', tags:['子供','希望','未来','SDGs','貧困','再生'], message:'18年間サッカーに人生を捧げた彼は、コロナでドイツリーグが中止になった瞬間、SNSで見たアートに衝撃を受け創作活動を開始。長坂真護氏に弟子入りし、タイのスラム街で子供たちの環境を目の当たりにして「空の宝箱を持った子供たち」を描き続けています。子供たちの未来を願う御社のパーパスと深く響き合います。' },
  { id:'shuhei',  nameEn:'TOMINAGA SHUHEI', nameJa:'富永周平', theme:'Who is that Hat? — 三角帽子の物語', tags:['国際','越境','物語','普遍性','唯一無二'], message:'1972年ローマで生まれ、多摩美術大学を経て再びイタリアでデザインを学んだ国際派。代表シリーズ「Who is that Hat?」は、三角帽子の匿名キャラクターを通して「人は自分を劇的に生きるために毎日を演じている」という哲学を表現。グッドデザイン賞8回、5カ国展示の経歴を持つ彼の作品は、国境を超えて活動する御社の理念と響き合います。' },
  { id:'kanou',   nameEn:'KANOU YOSHIMI', nameJa:'加納芳美', theme:'ミクストメディア — 異素材の調和', tags:['実験','童心','自然','第二のキャリア'], message:'鳥取生まれ島根育ち、漫画模写と動物飼育に夢中だった幼少期。広島市立大学彫刻専攻卒業後15年間イラストレーターとして活動した後、2016年に「改めて自分の世界観を表現したい」と絵画へ。2019年からは布やショッパーなどの日常素材を使ったミクストメディアへ移行し、異素材の調和を追求。第二のキャリアを楽しむ姿勢が御社のカルチャーと響き合います。', photo:'', grad:'linear-gradient(135deg,#3a3a3a 0%,#888 100%)', initial:'KA', works:['linear-gradient(135deg,#3a3a3a 0%,#aaa 100%)','linear-gradient(135deg,#777 0%,#444 100%)','linear-gradient(135deg,#555 0%,#333 100%)'] }
];

// 各アーティストにphoto/grad/initial/worksをマップで一括付与
var ARTIST_VISUAL = {
  'azuma':   { grad:'linear-gradient(135deg,#2a2a2a 0%,#01ae84 100%)', initial:'AZ' },
  'bond':    { grad:'linear-gradient(135deg,#1a3a3a 0%,#88a8a8 100%)', initial:'BO' },
  'chob':    { grad:'linear-gradient(135deg,#222 0%,#dc4444 100%)', initial:'CH' },
  'dots':    { grad:'linear-gradient(135deg,#3a2a4a 0%,#01ae84 100%)', initial:'DO' },
  'erika':   { grad:'linear-gradient(135deg,#4a3a3a 0%,#e8b888 100%)', initial:'ER' },
  'fuji':    { grad:'linear-gradient(135deg,#3a3a4a 0%,#c8a8c8 100%)', initial:'FU' },
  'gen':     { grad:'linear-gradient(135deg,#2a3a2a 0%,#88a888 100%)', initial:'GE' },
  'green':   { grad:'linear-gradient(135deg,#1a4a3a 0%,#88c8a8 100%)', initial:'GI' },
  'ito':     { grad:'linear-gradient(135deg,#3a3a2a 0%,#c8b888 100%)', initial:'IT' },
  'kathmi':  { grad:'linear-gradient(135deg,#4a2a3a 0%,#c8a8b8 100%)', initial:'KA' },
  'kita':    { grad:'linear-gradient(135deg,#2a2a3a 0%,#7878a8 100%)', initial:'KI' },
  'ookuma':  { grad:'linear-gradient(135deg,#3a3a3a 0%,#a8a8a8 100%)', initial:'OK' },
  'olioli':  { grad:'linear-gradient(135deg,#3a4a4a 0%,#a8c8c8 100%)', initial:'OL' },

  'shimoie': { grad:'linear-gradient(135deg,#2a2a3a 0%,#a888a8 100%)', initial:'SH' },
  'shin':    { grad:'linear-gradient(135deg,#3a2a2a 0%,#c88888 100%)', initial:'SL' },

};
// マスターに visual を merge
ARTISTS.forEach(function(a){
  var v = ARTIST_VISUAL[a.id] || { grad:'linear-gradient(135deg,#333,#666)', initial:'?' };
  a.grad = v.grad;
  a.initial = v.initial;
});

// ════════ 状態 ════════
var currentQ = 0;
var answers = [];

// ════════ Screen切替 ════════
function showScreen(id) {
  document.querySelectorAll('.match-screen').forEach(function(s){
    s.classList.toggle('is-active', s.id === id);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════ スタート ════════
document.getElementById('start-btn').addEventListener('click', function(){
  currentQ = 0;
  answers = [];
  showQuestion(0);
  showScreen('screen-question');
});

// ════════ 質問表示 ════════
function showQuestion(idx) {
  var q = QUESTIONS[idx];
  document.getElementById('q-progress').textContent = 'QUESTION ' + (idx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('q-progress-fill').style.width = ((idx + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('q-title').textContent = q.text;
  var optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';
  q.options.forEach(function(opt, oi){
    var btn = document.createElement('button');
    btn.className = 'match-option';
    btn.textContent = opt.label;
    btn.addEventListener('click', function(){ selectOption(idx, oi); });
    optsEl.appendChild(btn);
  });
}

// ════════ 選択処理 ════════
function selectOption(qIdx, optIdx) {
  var q = QUESTIONS[qIdx];
  answers.push({ qIdx: qIdx, optIdx: optIdx, tags: q.options[optIdx].tags, weight: q.weight });
  if (qIdx + 1 < QUESTIONS.length) {
    showQuestion(qIdx + 1);
  } else {
    showScreen('screen-loading');
    setTimeout(function(){ showResult(); }, 1400);
  }
}

// ════════ スコア計算＆結果表示 ════════
function showResult() {
  var scored = ARTISTS.map(function(a){
    var score = 0;
    var matchedTags = [];
    answers.forEach(function(ans){
      ans.tags.forEach(function(tag){
        if (a.tags.indexOf(tag) !== -1) {
          score += ans.weight;
          matchedTags.push(tag);
        }
      });
    });
    // Q1で一致したタグがあれば同点ブレイカー用にフラグ
    var q1Match = false;
    if (answers[0]) {
      answers[0].tags.forEach(function(tag){
        if (a.tags.indexOf(tag) !== -1) q1Match = true;
      });
    }
    return { artist: a, score: score, q1Match: q1Match, matchedTags: matchedTags };
  });

  // ソート：score desc, q1Match優先
  scored.sort(function(a, b){
    if (b.score !== a.score) return b.score - a.score;
    if (b.q1Match && !a.q1Match) return 1;
    if (a.q1Match && !b.q1Match) return -1;
    return 0;
  });

  var main = scored[0];
  var subs = scored.slice(1, 4);

  // メイン表示
  var mainPhotoStyle = main.artist.photo
    ? 'background-image:url(' + main.artist.photo + ');'
    : 'background:' + main.artist.grad + ';';
  var mainPhotoInner = main.artist.photo ? '' : '<span class="result-main-photo-initial">' + main.artist.initial + '</span>';
  document.getElementById('main-artist').innerHTML =
    '<div class="result-main-photo" style="' + mainPhotoStyle + '">' + mainPhotoInner + '</div>' +
    '<div class="result-main-body">' +
      '<div class="result-main-name-en">' + main.artist.nameEn + '</div>' +
      '<div class="result-main-name-ja">' + main.artist.nameJa + '</div>' +
      '<div class="result-main-theme">' + main.artist.theme + '</div>' +
      '<div class="result-main-message">' + main.artist.message + '</div>' +
      '<div class="result-main-cta"><a href="artist-single.html">このアーティストの詳細</a></div>' +
    '</div>';

  // サブ3名表示
  document.getElementById('sub-artists').innerHTML = subs.map(function(s){
    var photoStyle = s.artist.photo
      ? 'background-image:url(' + s.artist.photo + ');'
      : 'background:' + s.artist.grad + ';';
    var photoInner = s.artist.photo ? '' : '<span class="result-sub-photo-initial">' + s.artist.initial + '</span>';
    return '<a href="artist-single.html" class="result-sub-card">' +
      '<div class="result-sub-photo" style="' + photoStyle + '">' + photoInner + '</div>' +
      '<div class="result-sub-body">' +
        '<div class="result-sub-name-en">' + s.artist.nameEn + '</div>' +
        '<div class="result-sub-name-ja">' + s.artist.nameJa + '</div>' +
        '<div class="result-sub-theme">' + s.artist.theme + '</div>' +
      '</div>' +
      '</a>';
  }).join('');

  showScreen('screen-result');
}

// ════════ もう一度診断 ════════
window.restart = function() {
  currentQ = 0;
  answers = [];
  showScreen('screen-start');
};

})();
</script>
